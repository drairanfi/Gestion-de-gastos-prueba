<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="./assets/styles/styles.css">
</head>
<body>
    <header class="dashboard-header">
    <h1>Dashboard Overview</h1>
    <a href="./gastos.html" class="btn-primary">Ver todos los gastos →</a>
  </header>
<div class="cards-container">
    <div class="content-card">
      <h2 class="content-card__title">Total gastado este mes</h2>
      <p class="content-card__value" id="metric-total">—</p>
    </div>
    <div class="content-card">
      <h2 class="content-card__title">Promedio diario de gastos</h2>
      <p class="content-card__value" id="metric-promedio">—</p>
    </div>
    <div class="content-card">
      <h2 class="content-card__title">Categoría con mayor gasto</h2>
      <p class="content-card__value" id="metric-categoria">—</p>
    </div>
    <div class="content-card">
      <h2 class="content-card__title">Número de transacciones del mes</h2>
      <p class="content-card__value" id="metric-transacciones">—</p>
    </div>
  </div>

  <div class="analytics-row">
    <div class="analytics-container">
      <h2 class="analytics-container__title">Gastos por categoría</h2>
      <div class="analytics-container__content" id="chart-container"></div>
    </div>

    <div class="recent-container">
      <h2 class="recent-container__title">Gastos recientes</h2>
      <ul class="recent-container__list" id="lista-recientes"></ul>
    </div>
  </div>
</body>
</html>
