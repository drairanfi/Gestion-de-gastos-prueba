<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos</title>
    <link rel="stylesheet" href="./src/styles/styles.css">
</head>
<script type="module" src="./src/js/app.js"></script>
<div id="expense-modal" class="modal modal--hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal__overlay" data-close></div>

  <div class="modal__content">
    <button class="modal__close" data-close aria-label="Cerrar">×</button>

    <h2 id="modal-title" class="modal__title">Expense form</h2>
    <p class="modal__subtitle">Registra un nuevo gasto.</p>

    <form id="expense-form" class="form" novalidate>
      <div class="form__field">
        <label for="description">Description</label>
        <input id="description" name="description" type="text" placeholder="Dinner" required>
        <span class="form__error" data-error-for="description"></span>
      </div>

      <div class="form__row">
        <div class="form__field">
          <label for="amount">Amount</label>
          <input id="amount" name="amount" type="number" min="0.01" step="0.01" placeholder="000" required>
          <span class="form__error" data-error-for="amount"></span>
        </div>

        <div class="form__field">
          <label for="date">Date</label>
          <input id="date" name="date" type="date" required>
          <span class="form__error" data-error-for="date"></span>
        </div>
      </div>

      <div class="form__field">
        <label for="category">Category</label>
        <select id="category" name="category" required>
          <option value="">Select category</option>
        </select>
        <span class="form__error" data-error-for="category"></span>
      </div>

      <div class="form__actions">
        <button type="button" class="btn-secondary" data-close>Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>
<body>
    <h1>Expenses</h1>

    <div class="expenses-toolbar">
        <div class="search">
            <input id="filter-search" class="search__input" type="text" placeholder="Buscar por descripción">
        </div>
        <div class="expenses-toolbar__actions">
            <button id="btn-new-expense" class="btn-primary">Nuevo gasto</button>
            <button id="btn-dashboard" class="btn-primary" onclick="window.location.href='index.html'">Ir a dashboard</button>
            <button id="btn-toggle-filters" class="expenses-toolbar__category" aria-expanded="false" aria-controls="filters-panel">Filtros</button>
        </div>
    </div>

    <div id="filters-panel" class="filters-panel filters-panel--hidden">
        <div class="filters-panel__field">
            <label for="filter-category">Categoría</label>
            <select id="filter-category">
                <option value="">Todas</option>
            </select>
        </div>
        <div class="filters-panel__field">
            <label for="filter-date-from">Desde</label>
            <input id="filter-date-from" type="date">
        </div>
        <div class="filters-panel__field">
            <label for="filter-date-to">Hasta</label>
            <input id="filter-date-to" type="date">
        </div>
        <button id="btn-clear-filters" class="btn-secondary">Limpiar filtros</button>
    </div>

    <div class="expenses-table">
        <div class="expenses-table__row expenses-table__row--header">
            <span class="expenses-table__cell">Description</span>
            <span class="expenses-table__cell">Category</span>
            <span class="expenses-table__cell">Date</span>
            <span class="expenses-table__cell">Amount</span>
            <span class="expenses-table__cell">Actions</span>
        </div>
        <div id="expenses-list"></div>
    </div>
</body>
</html>
