<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos</title>
    <link rel="stylesheet" href="./assets/styles/styles.css">
</head>
<script type="module" src="./assets/js/app.js"></script>
<button id="btn-nuevo-gasto" class="btn-primary">Nuevo gasto</button>
<div id="modal-gasto" class="modal modal--hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal__overlay" data-close></div>

  <div class="modal__content">
    <button class="modal__close" data-close aria-label="Cerrar">×</button>

    <h2 id="modal-title" class="modal__title">Expense form</h2>
    <p class="modal__subtitle">Registra un nuevo gasto.</p>

    <form id="form-gasto" class="form" novalidate>
      <div class="form__field">
        <label for="descripcion">Description</label>
        <input id="descripcion" name="descripcion" type="text" placeholder="Dinner" required>
        <span class="form__error" data-error-for="descripcion"></span>
      </div>

      <div class="form__row">
        <div class="form__field">
          <label for="monto">Amount</label>
          <input id="monto" name="monto" type="number" min="0.01" step="0.01" placeholder="000" required>
          <span class="form__error" data-error-for="monto"></span>
        </div>

        <div class="form__field">
          <label for="fecha">Date</label>
          <input id="fecha" name="fecha" type="date" required>
          <span class="form__error" data-error-for="fecha"></span>
        </div>
      </div>

      <div class="form__field">
        <label for="categoria">Category</label>
        <select id="categoria" name="categoria" required>
          <option value="">Select category</option>
        </select>
        <span class="form__error" data-error-for="categoria"></span>
      </div>

      <div class="form__actions">
        <button type="button" class="btn-secondary" data-close>Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>
<body>
    <h1>Expenses</h1>

    <div class="expenses-toolbar">
        <div class="search">
            <input class="search__input" type="text" placeholder="Search">
        </div>
        <button class="expenses-toolbar__category">Category</button>
    </div>

    <div class="expenses-table">
        <div class="expenses-table__row expenses-table__row--header">
            <span class="expenses-table__cell">Description</span>
            <span class="expenses-table__cell">Category</span>
            <span class="expenses-table__cell">Date</span>
            <span class="expenses-table__cell">Amount</span>
        </div>
        <div id="lista-gastos"></div>
    </div>
</body>
</html>
